<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/*#root{width:27%;font-family:system-ui,sans-serif;background:#080818;border-radius:14px;overflow:hidden;touch-action:none}*/
#root{
  width:100%;
  max-width:420px;   /* desktop এ সুন্দর centered card */
  margin:auto;
  font-family:system-ui,sans-serif;
  background:#080818;
  border-radius:14px;
  overflow:hidden;
  touch-action:panning;
} 
@media (max-width: 480px){
  #root{
    max-width:100%;
    border-radius:0; /* full screen feel */
  }

  #topBar, #botBar{
    padding:6px 10px;
  }
}


body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#707070;
  background-image: url("img/bg.png");
}
#canvasWrap{
  width:100%;
  max-height:80vh; /* বড় স্ক্রিনে overflow আটকাবে */
}


#topBar{display:flex;align-items:center;justify-content:space-between;padding:clamp(6px,2vw,12px) clamp(8px,3vw,16px);background:#12122a;border-bottom:1px solid rgba(255,255,255,0.07)}
.sb{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:clamp(50px,15vw,80px)}
.sl{font-size:clamp(9px,2.2vw,11px);color:rgba(160,160,210,0.6);letter-spacing:.08em;text-transform:uppercase}
.sv{font-size:clamp(16px,5vw,22px);font-weight:700;color:#fff;line-height:1}
.sv.gold{color:#ffd700}
#lvlBadge{display:flex;flex-direction:column;align-items:center;gap:2px}
#lvlName{font-size:clamp(11px,3vw,14px);color:#9090cc;font-weight:600}
#lvlNum{font-size:clamp(9px,2.2vw,11px);color:#5555aa}
#progWrap{padding:4px clamp(8px,3vw,16px) 3px;background:#0c0c20}
#progBar{width:100%;height:clamp(3px,1vw,5px);background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
#progFill{height:100%;background:linear-gradient(90deg,#4a3fd4,#a855f7);border-radius:3px;transition:width .4s ease;width:0%}
#canvasWrap{position:relative;width:100%;line-height:0}
#gc{display:block;width:100%;touch-action:none}
#dangerGlow{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,60,60,0);transition:background .3s;pointer-events:none}
#dangerGlow.on{background:rgba(255,60,60,0.6)}
#comboMsg{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:clamp(16px,5vw,24px);font-weight:800;color:#ffd700;text-align:center;pointer-events:none;opacity:0;transition:transform .18s,opacity .35s;white-space:nowrap;text-shadow:0 0 16px rgba(255,215,0,.5)}
#comboMsg.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#botBar{display:flex;align-items:center;justify-content:space-between;padding:clamp(6px,2vw,10px) clamp(8px,3vw,14px);background:#12122a;border-top:1px solid rgba(255,255,255,0.07);gap:8px}
.previewBox{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.previewLbl{font-size:clamp(8px,2vw,10px);color:rgba(160,160,210,0.5);letter-spacing:.08em;text-transform:uppercase}
.midCtrl{display:flex;flex-direction:column;align-items:center;gap:clamp(4px,1.5vw,8px);flex:1}
#swapBtn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(200,200,255,.85);font-size:clamp(10px,2.8vw,13px);padding:clamp(4px,1.2vw,7px) clamp(8px,2.5vw,14px);border-radius:8px;cursor:pointer;transition:background .2s,transform .1s;white-space:nowrap}
#swapBtn:hover{background:rgba(255,255,255,0.15);color:#fff}
#swapBtn:active{transform:scale(.96)}
#swapBtn.used{opacity:.35;pointer-events:none}
#livesRow{display:flex;gap:clamp(3px,1vw,5px);align-items:center}
.hrt{width:clamp(10px,2.8vw,15px);height:clamp(10px,2.8vw,15px);flex-shrink:0}
#overlay{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,3vw,18px);background:rgba(4,4,18,.93);border-radius:14px}
#overlay.show{display:flex}
#ovIcon{font-size:clamp(32px,10vw,52px)}
#ovTitle{font-size:clamp(20px,6vw,30px);font-weight:700;color:#fff;text-align:center}
#ovSub{font-size:clamp(11px,3vw,14px);color:rgba(200,200,255,.65);text-align:center;padding:0 16px}
#ovStats{display:flex;gap:clamp(8px,3vw,20px)}
.ostat{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.06);padding:clamp(7px,2vw,12px) clamp(10px,3vw,18px);border-radius:10px}
.ostat span:first-child{font-size:clamp(8px,2vw,10px);color:rgba(160,160,210,.5);letter-spacing:.08em;text-transform:uppercase}
.ostat span:last-child{font-size:clamp(18px,5vw,24px);font-weight:700;color:#fff}
#playBtn{padding:clamp(10px,3vw,14px) clamp(24px,7vw,36px);background:linear-gradient(135deg,#4a3fd4,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:clamp(13px,3.5vw,16px);font-weight:700;cursor:pointer;transition:transform .15s}
#playBtn:hover{transform:scale(1.04)}
#playBtn:active{transform:scale(.97)}
</style>

<div id="root">
  <div id="topBar">
    <div class="sb"><span class="sl">Score</span><span class="sv" id="scoreEl">0</span></div>
    <div id="lvlBadge"><span id="lvlName">Novice</span><span id="lvlNum">Level 1</span></div>
    <div class="sb"><span class="sl">Best</span><span class="sv gold" id="bestEl">0</span></div>
  </div>
  <div id="progWrap"><div id="progBar"><div id="progFill"></div></div></div>
  <div id="canvasWrap">
    <canvas id="gc"></canvas>
    <div id="dangerGlow"></div>
    <div id="comboMsg"></div>
    <div id="overlay">
      <div id="ovIcon">🎮</div>
      <div id="ovTitle">Game Over</div>
      <div id="ovSub">The bubbles reached the danger zone!</div>
      <div id="ovStats">
        <div class="ostat"><span>SCORE</span><span id="os1">0</span></div>
        <div class="ostat"><span>LEVEL</span><span id="os2">1</span></div>
        <div class="ostat"><span>POPS</span><span id="os3">0</span></div>
      </div>
      <button id="playBtn">Play Again</button>
    </div>
  </div>
  <div id="botBar">
    <div class="previewBox">
      <span class="previewLbl">Current</span>
      <canvas id="cc"></canvas>
    </div>
    <div class="midCtrl">
      <button id="swapBtn">&#8644; Swap</button>
      <div id="livesRow"></div>
    </div>
    <div class="previewBox">
      <span class="previewLbl">Next</span>
      <canvas id="nc"></canvas>
    </div>
  </div>
</div>

<script>
const GC=document.getElementById('gc'),ctx=GC.getContext('2d');
const CC=document.getElementById('cc'),cctx=CC.getContext('2d');
const NC=document.getElementById('nc'),nctx=NC.getContext('2d');
const overlay=document.getElementById('overlay');
const comboMsg=document.getElementById('comboMsg');

const COLS=11,ROWS=16;
const PALETTE=['#e63946','#f4a261','#2ec4b6','#4cc9f0','#8b5cf6','#22c55e','#f72585','#facc15'];
const LVL_NAMES=['Novice','Rookie','Skilled','Expert','Master','Legend'];

let W,H,BR,prevW=0;
let grid=[],shooter=null,nextBub=null,swapBub=null,shotBub=null;
let shooting=false,gameOver=false,swapUsed=false;
let score=0,best=+(localStorage.getItem('bspro_best')||0),lives=5,combo=0,totalPops=0;
let level=1,popsLvl=0;
let aimAngle=-Math.PI/2;
let particles=[],popFX=[],fallFX=[];
let stars=[],raf=null,lastT=0;

function rng(min,max){return min+Math.random()*(max-min);}
function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function lighten(h,a){const c=h2r(h);return`rgb(${Math.min(255,c.r+255*a)},${Math.min(255,c.g+255*a)},${Math.min(255,c.b+255*a)})`;}
function darken(h,a){const c=h2r(h);return`rgb(${Math.max(0,c.r-255*a)},${Math.max(0,c.g-255*a)},${Math.max(0,c.b-255*a)})`;}

function sizeUp(){
  const wrap=document.getElementById('canvasWrap');
  W=wrap.clientWidth;
  H=Math.round(W*1.22);
  if(W===prevW) return; prevW=W;
  GC.width=W; GC.height=H;
  const ps=Math.round(W*0.15);
  CC.width=ps; CC.height=ps;
  NC.width=ps; NC.height=ps;
  BR=W/(COLS*2+1.4);
  stars=Array.from({length:55},()=>({x:rng(0,W),y:rng(0,H),r:rng(.3,1.3),a:rng(.15,.55)}));
}

function bxy(r,c){
  return{x:BR+c*BR*2+(r%2?BR:0), y:BR+r*BR*1.73};
}
function spPos(){return{x:W/2,y:H-Math.round(BR*2.2)};}

function drawBub(c2,x,y,col,r,al=1,wb=0,sc=1){
  if(al<=0||sc<=0) return;
  c2.save(); c2.globalAlpha=Math.max(0,Math.min(1,al));
  c2.translate(x,y);
  if(wb>.01) c2.scale(1+wb*.08,1-wb*.06);
  c2.scale(sc,sc); c2.translate(-x,-y);
  const g=c2.createRadialGradient(x-r*.32,y-r*.36,r*.04,x,y,r);
  g.addColorStop(0,lighten(col,.62)); g.addColorStop(.35,col);
  g.addColorStop(.75,darken(col,.25)); g.addColorStop(1,darken(col,.55));
  c2.beginPath(); c2.arc(x,y,r*.93,0,Math.PI*2); c2.fillStyle=g; c2.fill();
  const sh=c2.createRadialGradient(x-r*.3,y-r*.33,0,x-r*.08,y-r*.08,r*.58);
  sh.addColorStop(0,'rgba(255,255,255,.8)'); sh.addColorStop(.5,'rgba(255,255,255,.18)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  c2.beginPath(); c2.arc(x,y,r*.93,0,Math.PI*2); c2.fillStyle=sh; c2.fill();
  c2.restore();
}

function drawBg(){
  ctx.fillStyle='#080818'; ctx.fillRect(0,0,W,H);
  for(const s of stars){ctx.save();ctx.globalAlpha=s.a*.6;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.restore();}
  const dy=dangerY();
  ctx.save(); ctx.globalAlpha=.1; ctx.strokeStyle='#ff4444'; ctx.lineWidth=1; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(0,dy); ctx.lineTo(W,dy); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

function dangerY(){return BR+(ROWS-3)*BR*1.73+BR*.5;}

function drawGrid(){
  for(let r=0;r<ROWS;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc;c++){const b=grid[r][c];if(!b||b.state!=='active')continue;const p=bxy(r,c);drawBub(ctx,p.x,p.y,b.color,BR,1,b.wb);}}
}

function drawTraj(){
  if(shooting||gameOver||!shooter) return;
  const sp=spPos(),spd=BR*.55;
  let dx=Math.cos(aimAngle)*spd,dy2=Math.sin(aimAngle)*spd,px=sp.x,py=sp.y;
  const dots=[];
  for(let i=0;i<280;i++){
    px+=dx; py+=dy2;
    if(px<BR){px=BR;dx=Math.abs(dx);}
    if(px>W-BR){px=W-BR;dx=-Math.abs(dx);}
    if(py<BR) break;
    if(i%5===0) dots.push({x:px,y:py,i});
    let hit=false;
    for(let r=0;r<ROWS&&!hit;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc&&!hit;c++){if(!grid[r][c]||grid[r][c].state!=='active')continue;const p=bxy(r,c);if(Math.hypot(px-p.x,py-p.y)<BR*1.9)hit=true;}}
    if(hit) break;
  }
  const tot=dots.length;
  dots.forEach((d,i)=>{const f=1-i/tot;ctx.save();ctx.globalAlpha=f*.5;ctx.beginPath();ctx.arc(d.x,d.y,Math.max(1.5,BR*.14*f),0,Math.PI*2);ctx.fillStyle=shooter.color;ctx.fill();ctx.restore();});
}

function drawShooter(){
  const sp=spPos();
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(sp.x,sp.y,BR*2.1,0,Math.PI*2); ctx.stroke(); ctx.restore();
  if(!shooting&&shooter){
    ctx.save(); ctx.strokeStyle=shooter.color+'55'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sp.x,sp.y); ctx.lineTo(sp.x+Math.cos(aimAngle)*BR*2.3,sp.y+Math.sin(aimAngle)*BR*2.3); ctx.stroke(); ctx.restore();
    drawBub(ctx,sp.x,sp.y,shooter.color,BR*1.02);
  }
  if(shooting&&shotBub) drawBub(ctx,shotBub.x,shotBub.y,shotBub.color,BR*1.02);
}

function drawFX(){
  popFX.forEach(p=>drawBub(ctx,p.x,p.y,p.col,BR,p.al,0,p.sc));
  fallFX.forEach(f=>{const p=bxy(f.r,f.c);drawBub(ctx,p.x,p.y+f.fy,f.col,BR,f.al);});
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.restore();});
}

function drawPreviews(){
  const ps=CC.width, c=ps/2;
  cctx.clearRect(0,0,ps,ps); nctx.clearRect(0,0,ps,ps);
  if(shooter) drawBub(cctx,c,c,shooter.color,c*.72);
  if(nextBub) drawBub(nctx,c,c,nextBub.color,c*.62);
}

function drawHearts(){
  const row=document.getElementById('livesRow');
  row.innerHTML='';
  for(let i=0;i<5;i++){
    const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('class','hrt'); s.setAttribute('viewBox','0 0 14 14');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M7 12s-5.5-3.5-5.5-7A3.5 3.5 0 017 3.5 3.5 3.5 0 0112.5 5c0 3.5-5.5 7-5.5 7z');
    p.setAttribute('fill',i<lives?'#e63946':'rgba(255,255,255,.15)');
    s.appendChild(p); row.appendChild(s);
  }
}

function nbrs(r,c){
  const od=r%2;
  return [{r:r-1,c:od?c:c-1},{r:r-1,c:od?c+1:c},{r,c:c-1},{r,c:c+1},{r:r+1,c:od?c:c-1},{r:r+1,c:od?c+1:c}]
    .filter(n=>n.r>=0&&n.r<ROWS&&n.c>=0&&n.c<(n.r%2?COLS-1:COLS));
}

function bfsMatch(r,c,col){
  const seen=new Set([`${r},${c}`]),q=[{r,c}],res=[];
  while(q.length){const cur=q.shift();res.push(cur);nbrs(cur.r,cur.c).forEach(n=>{const k=`${n.r},${n.c}`;if(!seen.has(k)&&grid[n.r]?.[n.c]?.color===col&&grid[n.r][n.c].state==='active'){seen.add(k);q.push(n);}});}
  return res;
}

function floating(){
  const conn=new Set(),q=[];
  for(let c=0;c<COLS;c++) if(grid[0]?.[c]?.state==='active'){q.push({r:0,c});conn.add(`0,${c}`);}
  while(q.length){const cur=q.shift();nbrs(cur.r,cur.c).forEach(n=>{const k=`${n.r},${n.c}`;if(!conn.has(k)&&grid[n.r]?.[n.c]?.state==='active'){conn.add(k);q.push(n);}});}
  const fl=[];
  for(let r=1;r<ROWS;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc;c++){if(grid[r]?.[c]?.state==='active'&&!conn.has(`${r},${c}`))fl.push({r,c});}}
  return fl;
}

function snapTo(sx,sy){
  let best=null,bd=9e9;
  for(let r=0;r<ROWS;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc;c++){if(grid[r][c])continue;const p=bxy(r,c);const d=Math.hypot(sx-p.x,sy-p.y);if(d<bd&&hasAnchor(r,c)){bd=d;best={r,c};}}}
  return best;
}

function hasAnchor(r,c){return r===0||nbrs(r,c).some(n=>grid[n.r]?.[n.c]?.state==='active');}

function burst(x,y,col,n=12){for(let i=0;i<n;i++){const a=rng(0,Math.PI*2),sp=rng(2,6);particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:rng(1.5,3.5),col,life:1});}}

function showCombo(n){
  const msgs=['','','Nice!','Great!','Awesome!','Amazing!','Combo x'+n];
  const m=n>=6?msgs[6]:(msgs[n]||''); if(!m) return;
  comboMsg.textContent=m; comboMsg.classList.add('show');
  clearTimeout(comboMsg._t);
  comboMsg._t=setTimeout(()=>{comboMsg.style.opacity='0';setTimeout(()=>{comboMsg.classList.remove('show');comboMsg.style.opacity='';},350);},900);
}

function addScore(pts){
  score+=pts;
  if(score>best){best=score;localStorage.setItem('bspro_best',best);document.getElementById('bestEl').textContent=best;}
  document.getElementById('scoreEl').textContent=score;
  const need=level*280;
  document.getElementById('progFill').style.width=Math.min(100,(popsLvl/need)*100)+'%';
  if(popsLvl>=need) levelUp();
}

function levelUp(){
  level=Math.min(level+1,6); popsLvl=0;
  document.getElementById('lvlNum').textContent='Level '+level;
  document.getElementById('lvlName').textContent=LVL_NAMES[level-1]||'Legend';
  document.getElementById('progFill').style.width='0%';
}

function place(r,c,col){
  grid[r][c]={color:col,state:'active',wb:0};
  const mat=bfsMatch(r,c,col);
  if(mat.length>=3){
    combo++;
    const cb=[0,0,50,100,200,400,800][Math.min(combo,6)];
    const pts=Math.round(mat.length*10*(1+Math.floor(combo/3)*.5)+cb);
    showCombo(combo);
    mat.forEach(m=>{const p=bxy(m.r,m.c);grid[m.r][m.c]=null;popFX.push({x:p.x,y:p.y,col,al:1,sc:1});burst(p.x,p.y,col,14);});
    totalPops+=mat.length; popsLvl+=mat.length; addScore(pts);
    setTimeout(()=>{
      floating().forEach(f=>{const p=bxy(f.r,f.c);const fc=grid[f.r][f.c].color;grid[f.r][f.c]=null;fallFX.push({r:f.r,c:f.c,col:fc,fy:0,vy:1,al:1});burst(p.x,p.y,fc,6);addScore(8);});
    },180);
  } else {
    combo=0;
    nbrs(r,c).forEach(n=>{if(grid[n.r]?.[n.c]) grid[n.r][n.c].wb=1;});
  }
  const dr=ROWS-3;
  for(let cc=0;cc<COLS;cc++){if(grid[dr]?.[cc]){endGame(false);return;}}
  checkWin();
}

function checkWin(){let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c])n++;if(!n)endGame(true);}

function endGame(win){
  gameOver=true;
  if(score>best){best=score;localStorage.setItem('bspro_best',best);}
  document.getElementById('ovIcon').textContent=win?'🏆':'💔';
  document.getElementById('ovTitle').textContent=win?'Level Clear!':'Game Over';
  document.getElementById('ovSub').textContent=win?'Amazing! You cleared the board!':'The bubbles reached the danger zone!';
  document.getElementById('os1').textContent=score;
  document.getElementById('os2').textContent=level;
  document.getElementById('os3').textContent=totalPops;
  overlay.classList.add('show');
}

function rndCol(){
  const used=new Set();for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r]?.[c])used.add(grid[r][c].color);
  const pool=[...used]; return pool.length?pool[Math.floor(Math.random()*pool.length)]:PALETTE[Math.floor(Math.random()*PALETTE.length)];
}

function newShooter(){shooter=nextBub;nextBub={color:rndCol()};if(!swapBub)swapBub={color:rndCol()};swapUsed=false;document.getElementById('swapBtn').classList.remove('used');drawPreviews();}

function doShoot(){
  if(gameOver||shooting||!shooter) return;
  const sp=spPos(),spd=BR*.58;
  shotBub={x:sp.x,y:sp.y,vx:Math.cos(aimAngle)*spd,vy:Math.sin(aimAngle)*spd,color:shooter.color};
  shooting=true; shooter=null;
}

function setAim(ex,ey){
  const rect=GC.getBoundingClientRect();
  const sx=(ex-rect.left)*(W/rect.width), sy=(ey-rect.top)*(H/rect.height);
  const sp=spPos();
  let a=Math.atan2(sy-sp.y,sx-sp.x);
  a=Math.max(-Math.PI+.12,Math.min(-.12,a));
  aimAngle=a;
}

function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=null;}
  for(let r=0;r<7;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc;c++){if(Math.random()<.88)grid[r][c]={color:PALETTE[Math.floor(Math.random()*6)],state:'active',wb:0};}}
}

function init(){
  gameOver=false;shooting=false;shotBub=null;combo=0;score=0;lives=5;totalPops=0;level=1;popsLvl=0;
  particles=[];popFX=[];fallFX=[];aimAngle=-Math.PI/2;
  document.getElementById('scoreEl').textContent='0';
  document.getElementById('bestEl').textContent=best;
  document.getElementById('lvlNum').textContent='Level 1';
  document.getElementById('lvlName').textContent='Novice';
  document.getElementById('progFill').style.width='0%';
  overlay.classList.remove('show');
  sizeUp(); initGrid();
  nextBub={color:rndCol()}; swapBub={color:rndCol()};
  newShooter(); drawHearts();
  if(raf) cancelAnimationFrame(raf);
  lastT=performance.now(); raf=requestAnimationFrame(loop);
}

function loop(ts){
  const dt=Math.min((ts-lastT)/16,3); lastT=ts;
  sizeUp();
  ctx.clearRect(0,0,W,H); drawBg(); drawTraj(); drawGrid(); drawFX(); drawShooter();
  for(let r=0;r<ROWS;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc;c++){const b=grid[r][c];if(b&&b.wb>.01)b.wb=Math.max(0,b.wb-.055*dt);}}
  popFX=popFX.filter(p=>p.al>0); popFX.forEach(p=>{p.sc+=.065*dt;p.al-=.075*dt;});
  fallFX=fallFX.filter(f=>f.al>0); fallFX.forEach(f=>{f.vy+=.55*dt;f.fy+=f.vy*dt;f.al-=.032*dt;});
  particles=particles.filter(p=>p.life>0); particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.2*dt;p.life-=.04*dt;});
  if(shooting&&shotBub){
    shotBub.x+=shotBub.vx*dt; shotBub.y+=shotBub.vy*dt;
    if(shotBub.x<BR){shotBub.x=BR;shotBub.vx=Math.abs(shotBub.vx);}
    if(shotBub.x>W-BR){shotBub.x=W-BR;shotBub.vx=-Math.abs(shotBub.vx);}
    let landed=false;
    if(shotBub.y<=BR){const s=snapTo(shotBub.x,BR);if(s)place(s.r,s.c,shotBub.color);landed=true;}
    else{for(let r=0;r<ROWS&&!landed;r++){const nc=r%2?COLS-1:COLS;for(let c=0;c<nc&&!landed;c++){if(!grid[r]?.[c]||grid[r][c].state!=='active')continue;const p=bxy(r,c);if(Math.hypot(shotBub.x-p.x,shotBub.y-p.y)<BR*1.88){const s=snapTo(shotBub.x,shotBub.y);if(s)place(s.r,s.c,shotBub.color);landed=true;}}}}
    if(landed){shooting=false;shotBub=null;if(!gameOver)newShooter();}
  }
  let dang=false;for(let c=0;c<COLS;c++)if(grid[ROWS-3]?.[c])dang=true;
  document.getElementById('dangerGlow').classList.toggle('on',dang);
  raf=requestAnimationFrame(loop);
}

let touchMoved=false, touchStartY=0;
GC.addEventListener('touchstart',e=>{e.preventDefault();touchMoved=false;const t=e.touches[0];touchStartY=t.clientY;setAim(t.clientX,t.clientY);},{passive:false});
GC.addEventListener('touchmove',e=>{e.preventDefault();touchMoved=true;const t=e.touches[0];setAim(t.clientX,t.clientY);},{passive:false});
GC.addEventListener('touchend',e=>{e.preventDefault();if(!touchMoved)doShoot();},{passive:false});
GC.addEventListener('mousemove',e=>{if(gameOver||shooting)return;setAim(e.clientX,e.clientY);});
GC.addEventListener('click',e=>{if(!('ontouchstart' in window))doShoot();});

document.getElementById('swapBtn').addEventListener('click',()=>{
  if(swapUsed||!shooter)return;
  const tmp=shooter.color; shooter.color=swapBub.color; swapBub.color=tmp;
  swapUsed=true; document.getElementById('swapBtn').classList.add('used'); drawPreviews();
});
document.getElementById('playBtn').addEventListener('click',init);
window.addEventListener('resize',()=>{sizeUp();drawPreviews();});

init();
</script>
